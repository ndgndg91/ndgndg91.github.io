<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 중요 리소스 미리 연결 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//pagead2.googlesyndication.com" />
    <link rel="dns-prefetch" href="//www.googletagmanager.com" />
    
    <title>Developer Playground | Giri's Place</title>
    
    <!-- Google AdSense Verification -->
    <meta name="google-adsense-account" content="ca-pub-6419722318302962">

    <!-- Scripts (Dynamically loaded to prevent ReactSnap pollution) -->
    <script>
      (function() {
        if (typeof window !== 'undefined' && navigator.userAgent === 'ReactSnap') return;

        // Google AdSense
        var adsense = document.createElement('script');
        adsense.async = true;
        adsense.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6419722318302962";
        adsense.crossOrigin = "anonymous";
        document.head.appendChild(adsense);

        // Kakao AdFit
        var kakao = document.createElement('script');
        kakao.type = 'text/javascript';
        kakao.src = "https://t1.daumcdn.net/kas/static/ba.min.js";
        kakao.async = true;
        document.head.appendChild(kakao);

        // Google Tag Manager
        var gtm = document.createElement('script');
        gtm.async = true;
        gtm.src = "https://www.googletagmanager.com/gtag/js?id=G-NPF85QYLNH";
        document.head.appendChild(gtm);
        
        window.dataLayer = window.dataLayer || [];
        window.gtag = function(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-NPF85QYLNH');
      })();
    </script>
  </head>
  <body>
    <!-- Fallback for Kakao AdFit (if dynamic load fails) -->
    <noscript><script src="https://t1.daumcdn.net/kas/static/ba.min.js" async></script></noscript>
    <div id="root"></div>
    <script type="text/javascript">
      // GitHub Pages SPA 라우팅 복원
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
